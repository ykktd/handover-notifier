<style>
/* ============================================================
 * 引き継ぎ通知Bot — スタイル
 * モバイルファーストで設計し、640px 以上は中央寄せの 1 カラム。
 * 色定数はワイヤーフレームと揃えてある。
 * ============================================================ */

:root {
  --bg: #f0ede8;
  --surface: #ffffff;
  --border: #e0dbd2;
  --accent: #3d6b52;
  --accent-light: #e8f0eb;
  --accent-mid: #5a8a6e;
  --text: #1a1a1a;
  --text-sub: #777;
  --text-mute: #bbb;
  --danger: #c0392b;
  --danger-light: #fdf0ef;
  --danger-border: #f5c6c2;
  --yellow: #d08000;
  --yellow-light: #fef9ec;
  --yellow-border: #f0d080;
  --slack-color: #4a154b;
  --slack-bg: #f3eef5;
  --gmail-color: #c5221f;
  --gmail-bg: #fdf0ef;
  --content-max: 640px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  -webkit-text-size-adjust: 100%;
}

button { font-family: inherit; }
input, textarea, select { font-family: inherit; }
a { color: var(--accent); }

#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.loader {
  padding: 40px;
  text-align: center;
  color: var(--text-sub);
}

/* ===== トップバー ===== */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-inner {
  width: 100%;
  max-width: var(--content-max);
  margin: 0 auto;
  height: 100%;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
}
.topbar-inner > :first-child { justify-self: start; }
.topbar-inner > :last-child  { justify-self: end; }
.topbar .logo {
  font-weight: 700;
  font-size: 15px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar .title {
  font-weight: 700;
  font-size: 15px;
  text-align: center;
}

/* ===== ボディ（中央寄せレイアウト） ===== */
.body {
  flex: 1;
  padding: 20px 16px 100px;
  max-width: var(--content-max);
  margin: 0 auto;
  width: 100%;
}

/* ===== ボタン共通 ===== */
.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 8px;
  border-radius: 6px;
  color: var(--text-sub);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
}
.icon-btn:hover { background: var(--bg); }

.action-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  color: var(--text-sub);
  display: inline-flex;
  align-items: center;
}
.action-btn:hover { background: var(--bg); }
.action-btn.danger { color: var(--danger); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 11px 20px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary {
  background: var(--surface);
  color: var(--text-sub);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 20px;
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
}

.btn-danger {
  background: var(--danger-light);
  color: var(--danger);
  border: 1px solid var(--danger-border);
  border-radius: 8px;
  padding: 10px 16px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-test {
  background: var(--yellow-light);
  color: var(--yellow);
  border: 1px solid var(--yellow-border);
  border-radius: 8px;
  padding: 10px 16px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-yellow {
  background: var(--yellow);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

/* ===== セクションヘッダ ===== */
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 24px 0 8px;
}
.section-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-sub);
  letter-spacing: 0.06em;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.section-label.danger { color: var(--danger); }
.section-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.section-line.danger { background: var(--danger-border); }
.section-count {
  font-size: 11px;
  color: var(--text-mute);
  white-space: nowrap;
}
.section-header--spaced { margin-top: 40px; }

/* ===== 通知カード ===== */
.section-cards {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}
.card-title {
  font-weight: 700;
  font-size: 14px;
  line-height: 1.4;
  word-break: break-word;
}
.card-actions {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}
.card-preview {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.65;
  margin-bottom: 8px;
  word-break: break-word;
}
.card-foot {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 12px;
}
.card-date { color: var(--text-mute); }
.link-mark {
  font-size: 11px;
  color: var(--accent-mid);
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.sent-mark {
  font-size: 11px;
  color: var(--text-mute);
  background: var(--bg);
  padding: 1px 6px;
  border-radius: 10px;
}

/* ===== 送信先バッジ ===== */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.badge-slack { background: var(--slack-bg); color: var(--slack-color); }
.badge-gmail { background: var(--gmail-bg); color: var(--gmail-color); }

/* ===== 空状態 ===== */
.empty {
  text-align: center;
  color: var(--text-sub);
  padding: 60px 20px;
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: 10px;
  margin-top: 16px;
}

/* ===== 前年度複製バナー ===== */
.duplicate-banner {
  background: var(--yellow-light);
  border: 1px solid var(--yellow-border);
  border-radius: 10px;
  padding: 12px 16px;
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.banner-icon { display: flex; align-items: center; color: var(--yellow); flex-shrink: 0; }
.banner-text { flex: 1; }
.banner-title {
  font-weight: 700;
  font-size: 13px;
  color: #5a3e00;
}
.banner-sub {
  font-size: 12px;
  color: #8a6020;
  margin-top: 1px;
}

/* ===== FAB ===== */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 28px;
  padding: 12px 20px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(61,107,82,0.35);
  z-index: 50;
}

/* ===== フォーム ===== */
.form-group { margin-bottom: 20px; }
.label {
  display: block;
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--text);
}
.label-sub {
  font-weight: 400;
  font-size: 12px;
  color: var(--text-sub);
  margin-left: 6px;
}
.input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
  outline: none;
}
.input:focus { border-color: var(--accent); }
.textarea {
  width: 100%;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  padding: 12px;
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
  outline: none;
  resize: vertical;
  min-height: 180px;
  line-height: 1.85;
}
.msg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
}
.counter {
  text-align: right;
  font-size: 11px;
  color: var(--text-mute);
  margin-top: 4px;
}
.counter.has-value { color: var(--accent-mid); }

.seg {
  display: flex;
  gap: 8px;
}
.seg-btn {
  flex: 1;
  padding: 9px 0;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-sub);
  font-weight: 400;
  cursor: pointer;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.seg-btn.active {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 700;
}
.seg-help {
  font-size: 12px;
  color: var(--text-sub);
  margin-top: 6px;
}
.seg-help a {
  font-weight: 700;
  cursor: pointer;
}

.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.danger-zone {
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

/* ===== 設定ページ ===== */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 16px;
}
.panel.danger { border-color: var(--danger-border); }
.panel-help {
  font-size: 12px;
  color: var(--text-sub);
  margin-top: 6px;
  line-height: 1.6;
}
.email-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.email-text {
  flex: 1;
  padding: 9px 12px;
  background: var(--bg);
  border-radius: 6px;
  font-size: 13px;
  word-break: break-all;
}
.email-add {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.email-add .input {
  flex: 1;
  min-width: 0;
}

/* ===== モーダル ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 16px;
}
.modal {
  background: var(--surface);
  border-radius: 14px;
  padding: 28px 24px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  max-height: calc(100vh - 32px);
  overflow-y: auto;
}
.modal-title {
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 4px;
}
.modal-sub {
  font-size: 13px;
  color: var(--text-sub);
  margin-bottom: 14px;
}
.modal-preview {
  background: var(--bg);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 20px;
}
.modal-preview-title {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 8px;
}
.modal-preview-body {
  font-size: 13px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}
.modal-preview-link {
  margin-top: 10px;
  font-size: 12px;
  color: var(--accent-mid);
  display: flex;
  align-items: center;
  gap: 4px;
  word-break: break-all;
}
.modal-success {
  text-align: center;
}
.modal-success .icon {
  margin-bottom: 10px;
  display: flex;
  justify-content: center;
  color: var(--accent);
}
.modal-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* ===== トースト ===== */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(26,26,26,0.92);
  color: #fff;
  padding: 10px 18px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 500;
  z-index: 300;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.toast.error { background: var(--danger); }

/* ===== モバイル（<640px）===== */
/* iOS Safari は input/textarea の font-size が 16px 未満だとフォーカス時に自動ズームするため上書き */
@media (max-width: 639px) {
  .input, .textarea { font-size: 16px; }
}

/* ===== タブレット・PC（≥640px）===== */
@media (min-width: 640px) {
  body { font-size: 14px; }
  .topbar { padding: 0 24px; }
  .body { padding: 24px 24px 120px; }
  .fab { bottom: 32px; right: 32px; padding: 14px 22px; }
}

/* ===== 大画面（≥1024px）===== */
@media (min-width: 1024px) {
  :root { --content-max: 880px; }
  .body { padding: 32px 32px 120px; }
  .section-cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
}

/* ===== スケルトンスクリーン ===== */
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position:  400px 0; }
}
.skeleton-line {
  border-radius: 6px;
  background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
  background-size: 800px 100%;
  animation: shimmer 1.4s infinite linear;
}
.skeleton-logo  { width: 160px; height: 24px; }
.skeleton-icon  { width: 32px;  height: 32px; border-radius: 50%; }
.skeleton-title { width: 55%;   height: 16px; margin-bottom: 10px; }
.skeleton-body  { width: 90%;   height: 13px; margin-bottom: 8px; }
.skeleton-foot  { width: 40%;   height: 12px; }
.skeleton-card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 8px;
}
.skeleton-body-wrap { padding-top: 16px; }
</style>
